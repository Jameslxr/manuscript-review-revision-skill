<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="8333" viewBox="0 0 1800 5000" role="img" aria-labelledby="title desc">
  <title id="title">面向不同目标期刊的科研论文审稿、改稿与投稿前检查 Skill</title>
  <desc id="desc">用于确认或推荐目标期刊，先由五至六个独立Agents完成科学审稿，作者授权后才开始修改，最终核查参考文献、图表、语言、期刊排版和投稿文件完整性的中文长流程图。</desc>
  <defs>
    <style>
      .title { font: 700 44px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 23px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #566174; }
      .phase { font: 700 24px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #475467; }
      .step { font: 700 20px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #667085; letter-spacing: 2px; }
      .heading { font: 700 31px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .body { font: 400 23px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #344054; }
      .cap { font: 400 20px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #566174; }
      .branch { font: 700 22px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #475467; }
      .small { font: 400 18px "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; fill: #667085; }
      .line { fill: none; stroke: #475569; stroke-width: 5; }
      .dash { fill: none; stroke: #98a2b3; stroke-width: 3; stroke-dasharray: 9 8; }
    </style>
  </defs>

  <rect width="1800" height="5000" fill="#ffffff"/>
  <text x="120" y="72" class="title">面向不同目标期刊的科研论文审稿、改稿与投稿前检查 Skill</text>
  <text x="120" y="120" class="subtitle">用途：确认或推荐目标期刊；先由 5–6 个独立 Agents 完成科学审稿；作者明确授权后才开始修改。</text>
  <text x="120" y="158" class="subtitle">最终核查 Claim–Evidence–Reference、图表、语言、期刊排版及投稿文件完整性。</text>

  <!-- Start -->
  <rect x="500" y="200" width="800" height="115" rx="58" fill="#172033"/>
  <text x="900" y="247" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="700" fill="#ffffff" text-anchor="middle">调用 $manuscript-review-revision</text>
  <text x="900" y="283" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif" font-size="21" font-weight="400" fill="#e7eaf0" text-anchor="middle">上传 manuscript；提供目标期刊、文章类型和投稿阶段（如已知）</text>
  <path d="M900 315 V350" class="line"/>
  <polygon points="900,370 889,350 911,350" fill="#475569"/>

  <!-- Target-journal decision -->
  <polygon points="570,520 900,370 1230,520 900,670" fill="#eef3f8" stroke="#8fa3b8" stroke-width="3"/>
  <text x="900" y="458" class="step" text-anchor="middle">第 1 步</text>
  <text x="900" y="510" class="heading" text-anchor="middle">目标期刊是否明确？</text>
  <text x="900" y="552" class="body" text-anchor="middle">如只有缩写，先确认期刊全名</text>
  <text x="900" y="594" class="cap" text-anchor="middle">未固定目标期刊前，不开始正式审稿</text>

  <!-- Unknown-target branch -->
  <path d="M570 520 H340 V690" class="line"/>
  <polygon points="340,710 329,690 351,690" fill="#475569"/>
  <text x="390" y="497" class="branch">不确定</text>

  <rect x="120" y="710" width="440" height="190" rx="22" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="340" y="752" class="step" text-anchor="middle">期刊推荐模式</text>
  <text x="340" y="797" class="heading" text-anchor="middle">推荐经过核实的 Top 5</text>
  <text x="340" y="839" class="body" text-anchor="middle">主题 · 创新性 · 研究质量 · 证据强度 · 匹配度</text>
  <text x="340" y="875" class="cap" text-anchor="middle">Web · PubMed/Crossref · NLM · 期刊官网</text>

  <path d="M340 900 V930" class="line"/>
  <polygon points="340,950 329,930 351,930" fill="#475569"/>
  <rect x="120" y="950" width="440" height="125" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <text x="340" y="1000" class="heading" text-anchor="middle">用户选择主要目标期刊</text>
  <text x="340" y="1040" class="cap" text-anchor="middle">备选期刊规则不得混入当前稿件</text>

  <!-- Known-target main branch and merge -->
  <path d="M900 670 V1080" class="line"/>
  <polygon points="900,1100 889,1080 911,1080" fill="#475569"/>
  <text x="922" y="720" class="branch">已明确</text>
  <path d="M560 1012 H600 V1160" class="line"/>
  <polygon points="600,1180 589,1160 611,1160" fill="#475569"/>

  <rect x="600" y="1100" width="600" height="130" rx="24" fill="#eef3f8" stroke="#8fa3b8" stroke-width="3"/>
  <text x="900" y="1153" class="heading" text-anchor="middle">固定一个主要目标期刊</text>
  <text x="900" y="1197" class="body" text-anchor="middle">确认期刊全名、文章类型和投稿阶段</text>

  <!-- Phase A -->
  <text x="120" y="1305" class="phase">A｜期刊规则与输入版本</text>
  <line x1="120" y1="1320" x2="1680" y2="1320" stroke="#d7dde7" stroke-width="3"/>

  <!-- Journal profile -->
  <rect x="400" y="1360" width="1000" height="190" rx="24" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="900" y="1402" class="step" text-anchor="middle">第 2 步</text>
  <text x="900" y="1448" class="heading" text-anchor="middle">建立目标期刊实时档案</text>
  <text x="900" y="1490" class="body" text-anchor="middle">读取当前作者指南、文章类型、字数、结构、图表、文献、数据与匿名政策</text>
  <text x="900" y="1527" class="cap" text-anchor="middle">Web · 期刊官方网站 · validate_journal_profile.py</text>
  <path d="M900 1230 V1340" class="line"/>
  <polygon points="900,1360 889,1340 911,1340" fill="#475569"/>

  <!-- Freeze input -->
  <rect x="400" y="1620" width="1000" height="185" rx="24" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="900" y="1662" class="step" text-anchor="middle">第 3 步</text>
  <text x="900" y="1708" class="heading" text-anchor="middle">读取、清点并冻结原稿</text>
  <text x="900" y="1750" class="body" text-anchor="middle">记录路径、修改时间、SHA-256、正文、图表、补充材料和缺失文件</text>
  <text x="900" y="1787" class="cap" text-anchor="middle">$documents · $pdf · 本地文件读取｜审稿期间保持只读</text>
  <path d="M900 1550 V1600" class="line"/>
  <polygon points="900,1620 889,1600 911,1600" fill="#475569"/>

  <!-- Phase B -->
  <text x="120" y="1880" class="phase">B｜独立科学审稿</text>
  <line x1="120" y1="1895" x2="1680" y2="1895" stroke="#d7dde7" stroke-width="3"/>

  <!-- Multi-agent panel -->
  <rect x="250" y="1935" width="1300" height="420" rx="28" fill="#f7f9fc" stroke="#aab7c5" stroke-width="3"/>
  <text x="900" y="1980" class="step" text-anchor="middle">第 4 步</text>
  <text x="900" y="2028" class="heading" text-anchor="middle">启动至少 5 个真实、独立的审稿 Agents</text>
  <text x="900" y="2066" class="cap" text-anchor="middle">高档期刊、复杂研究或图表密集型稿件增加第 6 个 Agent</text>

  <rect x="300" y="2110" width="570" height="72" rx="14" fill="#ffffff" stroke="#d7dde7" stroke-width="2"/>
  <text x="585" y="2140" class="body" text-anchor="middle">Agent 1｜期刊匹配与编辑门槛</text>
  <text x="585" y="2168" class="small" text-anchor="middle">scope · priority · readership · desk-reject risk</text>

  <rect x="930" y="2110" width="570" height="72" rx="14" fill="#ffffff" stroke="#d7dde7" stroke-width="2"/>
  <text x="1215" y="2140" class="body" text-anchor="middle">Agent 2｜领域科学性与创新性</text>
  <text x="1215" y="2168" class="small" text-anchor="middle">novelty · mechanism · interpretation</text>

  <rect x="300" y="2200" width="570" height="72" rx="14" fill="#ffffff" stroke="#d7dde7" stroke-width="2"/>
  <text x="585" y="2230" class="body" text-anchor="middle">Agent 3｜研究设计与验证</text>
  <text x="585" y="2258" class="small" text-anchor="middle">cohort · controls · bias · causal boundary</text>

  <rect x="930" y="2200" width="570" height="72" rx="14" fill="#ffffff" stroke="#d7dde7" stroke-width="2"/>
  <text x="1215" y="2230" class="body" text-anchor="middle">Agent 4｜统计与可重复性</text>
  <text x="1215" y="2258" class="small" text-anchor="middle">statistics · leakage · effect size · reproducibility</text>

  <rect x="300" y="2290" width="570" height="72" rx="14" fill="#ffffff" stroke="#d7dde7" stroke-width="2"/>
  <text x="585" y="2320" class="body" text-anchor="middle">Agent 5｜Claim–Evidence–Reference</text>
  <text x="585" y="2348" class="small" text-anchor="middle">claim ceiling · exact evidence · citation support</text>

  <rect x="930" y="2290" width="570" height="72" rx="14" fill="#ffffff" stroke="#d7dde7" stroke-width="2"/>
  <text x="1215" y="2320" class="body" text-anchor="middle">可选 Agent 6｜图表叙事或对抗性审查</text>
  <text x="1215" y="2348" class="small" text-anchor="middle">figure closure · reporting · adversarial review</text>

  <text x="900" y="2398" class="cap" text-anchor="middle">spawn_agent · 相同冻结版本 · 互不查看结论 · validate_review_panel.py</text>
  <path d="M900 1805 V1915" class="line"/>
  <polygon points="900,1935 889,1915 911,1915" fill="#475569"/>

  <!-- Synthesis -->
  <rect x="400" y="2445" width="1000" height="190" rx="24" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="900" y="2487" class="step" text-anchor="middle">第 5 步</text>
  <text x="900" y="2533" class="heading" text-anchor="middle">Root Agent 汇总交叉审稿矩阵</text>
  <text x="900" y="2575" class="body" text-anchor="middle">保留分歧，不简单投票；按严重度、证据位置、可修复性和期刊风险排序</text>
  <text x="900" y="2612" class="cap" text-anchor="middle">结论：可以修改｜重大科学重做｜建议转投｜NOT ASSESSABLE</text>
  <path d="M900 2355 V2425" class="line"/>
  <polygon points="900,2445 889,2425 911,2425" fill="#475569"/>

  <!-- Phase C -->
  <text x="120" y="2710" class="phase">C｜作者决策门</text>
  <line x1="120" y1="2725" x2="1680" y2="2725" stroke="#d7dde7" stroke-width="3"/>

  <!-- Author authorization -->
  <polygon points="590,2870 900,2735 1210,2870 900,3005" fill="#fff9e8" stroke="#dfbd4f" stroke-width="3"/>
  <text x="900" y="2817" class="step" text-anchor="middle">第 6 步</text>
  <text x="900" y="2862" class="heading" text-anchor="middle">作者是否授权开始修改？</text>
  <text x="900" y="2904" class="body" text-anchor="middle">先查看综合审稿结论和阻断问题</text>
  <text x="900" y="2942" class="cap" text-anchor="middle">即使选择 full-run，这里仍然强制暂停</text>
  <path d="M900 2635 V2715" class="line"/>
  <polygon points="900,2735 889,2715 911,2715" fill="#475569"/>

  <!-- No authorization -->
  <path d="M1210 2870 H1285" class="line"/>
  <polygon points="1305,2870 1285,2859 1285,2881" fill="#475569"/>
  <text x="1247" y="2848" class="branch">未授权</text>
  <rect x="1305" y="2790" width="375" height="160" rx="80" fill="#f9fafb" stroke="#cbd5e1" stroke-width="3"/>
  <text x="1492" y="2843" class="heading" text-anchor="middle">停止</text>
  <text x="1492" y="2886" class="body" text-anchor="middle">保存原稿和审稿报告</text>
  <text x="1492" y="2924" class="cap" text-anchor="middle">不修改、不润色、不排版</text>

  <!-- Phase D -->
  <text x="120" y="3095" class="phase">D｜授权后的修改与逐项核查</text>
  <line x1="120" y1="3110" x2="1680" y2="3110" stroke="#d7dde7" stroke-width="3"/>

  <!-- Scientific revision -->
  <path d="M900 3005 V3140" class="line"/>
  <polygon points="900,3160 889,3140 911,3140" fill="#475569"/>
  <text x="922" y="3070" class="branch">已授权</text>
  <rect x="400" y="3160" width="1000" height="180" rx="24" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="900" y="3202" class="step" text-anchor="middle">第 7 步</text>
  <text x="900" y="3248" class="heading" text-anchor="middle">优先解决科学问题</text>
  <text x="900" y="3290" class="body" text-anchor="middle">阻断性问题 → 方法与统计 → 验证 → Claim边界 → 文章结构</text>
  <text x="900" y="3327" class="cap" text-anchor="middle">主 Skill：revision-and-response 规则｜保留原稿、tracked copy 和 revision log</text>

  <!-- Reference audit -->
  <rect x="400" y="3420" width="1000" height="190" rx="24" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="900" y="3462" class="step" text-anchor="middle">第 8 步</text>
  <text x="900" y="3508" class="heading" text-anchor="middle">逐句核查 Claim 与参考文献</text>
  <text x="900" y="3550" class="body" text-anchor="middle">真实性 · 撤稿状态 · 精确支持 · 引用位置 · 目标期刊格式</text>
  <text x="900" y="3587" class="cap" text-anchor="middle">Web · PubMed/Crossref · 出版社全文 · validate_reference_audit.py</text>
  <path d="M900 3340 V3400" class="line"/>
  <polygon points="900,3420 889,3400 911,3400" fill="#475569"/>

  <!-- Figure closure -->
  <rect x="400" y="3690" width="1000" height="175" rx="24" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="900" y="3732" class="step" text-anchor="middle">第 9 步</text>
  <text x="900" y="3778" class="heading" text-anchor="middle">检查正文–图表–图注–数据闭环</text>
  <text x="900" y="3820" class="body" text-anchor="middle">数字、样本量、统计、panel标签、图注和正文解释必须一致</text>
  <text x="900" y="3857" class="cap" text-anchor="middle">$scipilot-figure-skill｜明确要求 Nature Figure 时才调用 $nature-figure</text>
  <path d="M900 3610 V3670" class="line"/>
  <polygon points="900,3690 889,3670 911,3670" fill="#475569"/>

  <!-- Language -->
  <rect x="400" y="3945" width="1000" height="175" rx="24" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="900" y="3987" class="step" text-anchor="middle">第 10 步</text>
  <text x="900" y="4033" class="heading" text-anchor="middle">最后进行语言与段落润色</text>
  <text x="900" y="4075" class="body" text-anchor="middle">语言优化不能掩盖尚未解决的科学、统计或证据问题</text>
  <text x="900" y="4112" class="cap" text-anchor="middle">按目标期刊规则处理；明确要求时调用 $nature-writing / $nature-polishing</text>
  <path d="M900 3865 V3925" class="line"/>
  <polygon points="900,3945 889,3925 911,3925" fill="#475569"/>

  <!-- Formatting -->
  <rect x="400" y="4200" width="1000" height="190" rx="24" fill="#f7f9fc" stroke="#cbd5e1" stroke-width="3"/>
  <text x="900" y="4242" class="step" text-anchor="middle">第 11 步</text>
  <text x="900" y="4288" class="heading" text-anchor="middle">按照目标期刊正式排版</text>
  <text x="900" y="4330" class="body" text-anchor="middle">官方模板优先；标题和正文默认黑色；禁止AI报告式卡片、横幅和装饰线</text>
  <text x="900" y="4367" class="cap" text-anchor="middle">$documents · $pdf · audit_docx_manuscript_style.py · 逐页渲染检查</text>
  <path d="M900 4120 V4180" class="line"/>
  <polygon points="900,4200 889,4180 911,4180" fill="#475569"/>

  <!-- Phase E -->
  <text x="120" y="4470" class="phase">E｜最终投稿检查</text>
  <line x1="120" y1="4485" x2="1680" y2="4485" stroke="#d7dde7" stroke-width="3"/>

  <!-- Release gate -->
  <rect x="400" y="4525" width="1000" height="205" rx="30" fill="#eef8f2" stroke="#66b486" stroke-width="3"/>
  <text x="900" y="4567" class="step" text-anchor="middle">第 12 步</text>
  <text x="900" y="4613" class="heading" text-anchor="middle">运行 Fail-Closed Release Gate</text>
  <text x="900" y="4655" class="body" text-anchor="middle">再次检查版本、科学结论、文献、图表、排版以及受修改影响的审稿门</text>
  <text x="900" y="4692" class="cap" text-anchor="middle">$manuscript-release-gate｜RELEASE PASS · RELEASE FAIL · RELEASE NOT ASSESSABLE</text>
  <path d="M900 4390 V4505" class="line"/>
  <polygon points="900,4525 889,4505 911,4505" fill="#475569"/>

  <!-- Final delivery -->
  <path d="M900 4730 V4780" class="line"/>
  <polygon points="900,4800 889,4780 911,4780" fill="#475569"/>
  <rect x="530" y="4800" width="740" height="115" rx="58" fill="#3b8c5a"/>
  <text x="900" y="4846" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif" font-size="29" font-weight="700" fill="#ffffff" text-anchor="middle">交付投稿文件包</text>
  <text x="900" y="4884" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="400" fill="#effaf3" text-anchor="middle">审稿报告 · 修订记录 · clean/tracked manuscript · 最终发布判断</text>

  <!-- Footer note -->
  <text x="900" y="4960" class="small" text-anchor="middle">核心原则：先确定期刊，先独立审稿；只有作者明确授权后才修改和润色。Nature Skills 仅在用户明确要求时调用。</text>
</svg>
