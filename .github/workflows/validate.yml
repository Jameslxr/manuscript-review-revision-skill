name: Validate skill

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile validator scripts
        run: python -m py_compile manuscript-review-revision/scripts/*.py

      - name: Validate release documentation
        run: python manuscript-review-revision/scripts/validate_release_docs.py

      - name: Run validator tests
        run: python -m unittest discover -s manuscript-review-revision/tests -v
